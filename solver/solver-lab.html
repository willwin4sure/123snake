    if(sum>=24) blip(659,.12,.16,'triangle',.08);
    if(sum>=96) blip(784,.18,.2,'triangle',.08);
  }
  function sUndo(){blip(230,0,.08,'sine',.07);blip(170,.07,.1,'sine',.07)}
  function sOver(){blip(330,0,.14,'sine',.07);blip(262,.15,.14,'sine',.07);blip(196,.3,.24,'sine',.07)}

  muteBtn.addEventListener('click',function(){
    soundOn=!soundOn;
    localStorage.setItem(KS,soundOn?'on':'off');
    if(soundOn){initAudio();sTick(0);}
    setMuteLabel();
  });
  undoBtn.addEventListener('click',undo);
  document.getElementById('newgame').addEventListener('click',newGame);
  document.getElementById('again').addEventListener('click',newGame);
  window.addEventListener('resize',layout);

  window.__snake={
    values:values,
    score:function(){return score},
    tryPath:function(cells){
      path=[];
      for(var i=0;i<cells.length;i++){
        var t=grid[cells[i][0]][cells[i][1]];
        if(!t) return false;
        if(i===0) path=[t];
        else if(canExtend(t)) path.push(t);
        else {path=[];return false;}
      }
      refresh();
      return true;
    },
    release:function(){if(path.length>=2)doMerge();},
    locked:function(){return lock},
    forceOver:function(){gameOver()}
  };

  var wx=null, wasmLoading=false, solverOn=false, autoOn=false, hintsData=null, policyData=null;
  var solverBtn=document.getElementById('solver');
  var playBtn=document.getElementById('playbest');
  var autoBtn=document.getElementById('autoplay');
  var hintsEl=document.getElementById('hints');

  function initWasm(cb){
    if(wx){cb();return;}
    if(wasmLoading)return;
    wasmLoading=true;
    try{
      var bin=atob(SNAKE_WASM);
      var bytes=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      WebAssembly.instantiate(bytes,{}).then(function(res){
        wx=res.instance.exports; wasmLoading=false; cb();
      },function(){wasmLoading=false; solverFail();});
    }catch(_){wasmLoading=false; solverFail();}
  }
  function solverFail(){
    solverOn=false;
    solverBtn.textContent='Solver: unavailable';
    solverBtn.disabled=true;
    if(!grid){
      overEl.querySelector('h2').textContent='Engine failed to load';
      finalEl.textContent='Reload the page to retry';
      overEl.hidden=false;
    }
  }
  function flatCells(){
    var out=[];
    for(var r=0;r<N;r++)for(var c=0;c<N;c++) out.push(grid[r][c]?grid[r][c].v:0);
    return out;
  }
  function analyze(){
    if(!wx) return;
    var ptr=wx.input_ptr();
    new Uint32Array(wx.memory.buffer,ptr,25).set(flatCells());
    var rp=wx.analyze(2,16,24,5,(Math.random()*4294967296)>>>0);
    var len=wx.result_len();
    var txt=new TextDecoder().decode(new Uint8Array(wx.memory.buffer,rp,len));
    var j=JSON.parse(txt);
    hintsData=j.moves;
    policyData=j;
    renderHints();
    renderPolicy();
  }
  function clearHintMarks(){
    eachTile(function(t){
      t.el.classList.remove('hint');
      if(!t.el.classList.contains('sel')) t.ord.className='ord';
    });
  }
  function markHint(h){
    clearHintMarks();
    h.path.forEach(function(ci,i){
      var t=grid[Math.floor(ci/N)][ci%N];
      if(!t) return;
      t.el.classList.add('hint');
      var nc=h.path[i+1];
      if(nc!==undefined){
        var t2=grid[Math.floor(nc/N)][nc%N];
        if(t2) t.ord.className='ord dir'+(t2.c>t.c?'':t2.c<t.c?' d180':t2.r>t.r?' d90':' d270');
      }
    });
  }
  function playMove(cells){
    if(lock||!solverOn) return;
    var tiles=cells.map(function(ci){return grid[Math.floor(ci/N)][ci%N];});
    if(tiles.some(function(t){return !t;})) return;
    path=tiles;
    if(path.length>=2) doMerge();
  }
  function renderHints(){
    hintsEl.innerHTML='';
    clearHintMarks();
    if(!solverOn||!hintsData){hintsEl.hidden=true;return;}
    hintsEl.hidden=false;
    if(!hintsData.length){
      var p=document.createElement('p');
      p.className='hintnote'; p.textContent='No moves available';
      hintsEl.appendChild(p);
      playBtn.disabled=true; autoBtn.disabled=true;
      return;
    }
    hintsData.forEach(function(h,i){
      var row=document.createElement('div');
      row.className='hintrow'+(i===0?' best':'');
      row.innerHTML='<b>'+h.value+' × '+h.path.length+' → '+h.sum+'</b><span class="ev">V '+h.ev.toFixed(0)+'</span>';
      row.addEventListener('mouseenter',function(){markHint(h);});
      row.addEventListener('click',function(){playMove(h.path);});
      hintsEl.appendChild(row);
    });
    var note=document.createElement('p');
    note.className='hintnote';
    note.textContent='Hover to preview, click to play · V = the engine\u2019s ranking value, not points';
    hintsEl.appendChild(note);
    markHint(hintsData[0]);
    playBtn.disabled=false; autoBtn.disabled=false;
  }
  function stopAuto(){
    autoOn=false;
    autoBtn.textContent='Autoplay';
  }
  function solverTick(){
    if(!solverOn) return;
    if(overEl.hidden===false){
      stopAuto(); hintsData=[]; renderHints(); return;
    }
    analyze();
    if(autoOn&&hintsData&&hintsData.length){
      setTimeout(function(){
        if(autoOn&&solverOn&&!lock&&overEl.hidden) playMove(hintsData[0].path);
      },450);
    }
  }
  solverBtn.addEventListener('click',function(){
    solverOn=!solverOn;
    solverBtn.textContent='Solver: '+(solverOn?'on':'off');
    if(solverOn){
      solverBtn.textContent=wx?'Solver: on':'Solver: loading\u2026';
      initWasm(function(){
        if(!solverOn) return;
        solverBtn.textContent='Solver: on';
        solverTick();
      });
    }else{
      stopAuto(); hintsData=null;
      hintsEl.hidden=true; hintsEl.innerHTML='';
      clearHintMarks();
      playBtn.disabled=true; autoBtn.disabled=true;
    }
  });
  playBtn.addEventListener('click',function(){
    if(hintsData&&hintsData.length&&!lock) playMove(hintsData[0].path);
  });
  autoBtn.addEventListener('click',function(){
    if(autoOn){stopAuto();return;}
    autoOn=true;
    autoBtn.textContent='Autoplay: on';
    if(hintsData&&hintsData.length&&!lock&&overEl.hidden) playMove(hintsData[0].path);
  });
  board.addEventListener('pointerdown',function(){
    if(solverOn){clearHintMarks();stopAuto();}
  },true);
  document.getElementById('newgame').addEventListener('click',stopAuto);
  document.getElementById('again').addEventListener('click',stopAuto);

  var CLASS_COLORS=['#CBD5C0','hsl(150,50%,64%)','hsl(38,90%,64%)','hsl(5,80%,76%)','hsl(266,72%,78%)'];
  var tabPlay=document.getElementById('tabPlay');
  var tabPolicy=document.getElementById('tabPolicy');
  var viewPlay=document.getElementById('viewPlay');
  var viewPolicy=document.getElementById('viewPolicy');
  function showTab(which){
    var play=which==='play';
    viewPlay.hidden=!play;
    viewPolicy.hidden=play;
    tabPlay.classList.toggle('tabon',play);
    tabPolicy.classList.toggle('tabon',!play);
    if(play){layout();}
    else{
      if(!policyData&&wx&&grid) analyze();
      renderPolicy();
    }
  }
  tabPlay.addEventListener('click',function(){showTab('play')});
  tabPolicy.addEventListener('click',function(){showTab('policy')});
  function fmtSigned(x){return (x>=0?'+':'\u2212')+Math.abs(x).toFixed(1)}
  function renderPolicy(){
    if(viewPolicy.hidden) return;
    var note=document.getElementById('policyNote');
    if(!policyData){note.textContent='Turn on the solver (Play tab) or wait for the engine\u2026';return;}
    note.textContent='Live from the Rust engine \u00b7 expectimax depth 2 \u00b7 16 refill samples';
    var ev=policyData.eval;
    var rows=[
      ['Game score','+'+score],
      ['Ladder tiles (2\u1d4f\u00b73)',fmtSigned(ev.smooth)],
      ['Three-heavy (3\u1d47, b \u2265 2)',fmtSigned(ev.three)],
      ['Powers of two \u2265 4',fmtSigned(ev.pow2)],
      ['Off-family (prime > 3)',fmtSigned(ev.off)],
      ['Optionality \u00b7 '+ev.pairs+' pairs',fmtSigned(ev.opt)]
    ];
    if(ev.over) rows.push(['Dead position',fmtSigned(ev.over)]);
    rows.push(['Position value',(score+ev.total).toFixed(1)]);
    document.getElementById('evalTable').innerHTML=rows.map(function(r,i){
      var cls=i===rows.length-1?' class="total"':'';
      return '<tr'+cls+'><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';
    }).join('');
    var flat=flatCells();
    document.getElementById('classGrid').innerHTML=policyData.classes.map(function(cl,i){
      return '<div style="background:'+CLASS_COLORS[cl]+'">'+flat[i]+'</div>';
    }).join('');
    var ct=document.getElementById('chainTable');
    if(!policyData.moves.length){ct.innerHTML='<tr><td>No moves</td><td></td></tr>';}
    else{
      var best=policyData.moves[0].ev;
      ct.innerHTML=policyData.moves.map(function(h,i){
        return '<tr><td>'+(i+1)+'. '+h.value+' \u00d7 '+h.path.length+' \u2192 '+h.sum+'</td><td>'+
          (i===0?'V '+h.ev.toFixed(0):'\u2212'+(best-h.ev).toFixed(1))+'</td></tr>';
      }).join('');
    }
    if(policyData.weights){
      document.getElementById('wTitle').textContent='Weights \u00b7 '+policyData.weights.name;
      document.getElementById('wTable').innerHTML=policyData.weights.rows.map(function(r){
        return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';
      }).join('');
    }
  }

  layout();
  hud();
  initWasm(function(){ newGame(); });
})();
</script>
