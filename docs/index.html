      settled=true;
      finalEl.textContent=txt;
      shareFeedback('Copy the text above');
      shareTip.classList.add('show');
    };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      setTimeout(fail,800);
      navigator.clipboard.writeText(txt).then(function(){
        if(!settled){settled=true;shareFeedback('Copied!');}
      },fail);
    }else{
      fail();
    }
  }
  shareBtn.addEventListener('click',function(){
    var txt='123 Snake \u2014 '+score+' points!\n'+emojiBoard()+'\nCan you beat it? Play: '+SHARE_URL;
    if(navigator.share&&/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){
      navigator.share({text:txt}).catch(function(){copyChain(txt);});
    }else{
      copyChain(txt);
    }
  });
  muteBtn.addEventListener('click',function(){
    soundOn=!soundOn;
    localStorage.setItem(KS,soundOn?'on':'off');
    if(soundOn){initAudio();sTick(0);}
    setMuteLabel();
  });
  document.getElementById('newgame').addEventListener('click',newGame);
  document.getElementById('again').addEventListener('click',newGame);
  window.addEventListener('resize',layout);

  window.__snake={
    values:values,
    score:function(){return score},
    tryPath:function(cells){
      path=[];
      for(var i=0;i<cells.length;i++){
        var t=grid[cells[i][0]][cells[i][1]];
        if(!t) return false;
        if(i===0) path=[t];
        else if(canExtend(t)) path.push(t);
        else {path=[];return false;}
      }
      refresh();
      return true;
    },
    release:function(){if(path.length>=2)doMerge();},
    locked:function(){return lock},
    forceOver:function(){gameOver()}
  };

  layout();
  newGame();
})();
</script>
</body>
</html>
